<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>omni_hokkien</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; line-height: 1.5;
  }
  .card { border: 1px solid #8884; border-radius: 10px; padding: 1rem 1.15rem; margin: 1rem 0; }
  .han { font-size: 1.25rem; font-weight: 600; }
  .gloss { color: #777; font-size: .9rem; margin: .15rem 0 .7rem; }
  audio { width: 100%; }
</style>
</head>
<body>
  <div class="card">
    <div class="han">你不要告诉我 他是我们的邻居</div>
    <div class="gloss">"Don't tell me he's our neighbor"</div>
    <audio controls preload="none" src="samples/0934.wav"></audio>
  </div>

  <div class="card">
    <div class="han">以后你没钱不要跟我拿</div>
    <div class="gloss">"Don't come to me for money when you're broke"</div>
    <audio controls preload="none" src="samples/0859.wav"></audio>
  </div>

  <div class="card">
    <div class="han">阿嬷 隔壁真的很过分</div>
    <div class="gloss">"Grandma, the neighbors are really too much"</div>
    <audio controls preload="none" src="samples/0801.wav"></audio>
  </div>

  <div class="card">
    <div class="han">第一个死的是你</div>
    <div class="gloss">"You'll be the first to die"</div>
    <audio controls preload="none" src="samples/0766.wav"></audio>
  </div>

  <div class="card">
    <div class="han">真的是气死我了</div>
    <div class="gloss">"I'm really furious"</div>
    <audio controls preload="none" src="samples/0747.wav"></audio>
  </div>
</body>
</html>
